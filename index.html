<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css">
    <title>Card Slider JavaScript</title>
</head>

<body>
    <div class="main-container">
        <div class="theme-switch">
            <button id="themeToggle">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Busque um nome (ex: James)...">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
        <div class="wrapper">
            <i id="left" class="fa-solid fa-angle-left"></i>
            <ul class="carousel">
                <li class="card">
                    <div class="img"><img
                            src="https://images.unsplash.com/photo-1554774853-719586f82d77?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                            alt="img" draggable="false"></div>
                    <h2>Lou Élio</h2>
                    <span>Sales Manager</span>
                </li>
                <li class="card">
                    <div class="img"><img
                            src="https://images.unsplash.com/photo-1556636530-6b7482d80e3d?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                            alt="img" draggable="false"></div>
                    <h2>Gurdeep Mehmud</h2>
                    <span>Web Developer</span>
                </li>
                <li class="card">
                    <div class="img"><img
                            src="https://images.unsplash.com/photo-1580894732444-8ecded7900cd?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                            alt="img" draggable="false"></div>
                    <h2>Sofiya Arisha</h2>
                    <span>Online Teacher</span>
                </li>
                <li class="card">
                    <div class="img"><img
                            src="https://images.unsplash.com/photo-1682668938117-a45b79fb4476?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                            alt="img" draggable="false"></div>
                    <h2>James Den</h2>
                    <span>Freelancer</span>
                </li>
                <li class="card">
                    <div class="img"><img
                            src="https://images.unsplash.com/photo-1758518727888-ffa196002e59?q=80&w=1031&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                            alt="img" draggable="false"></div>
                    <h2>Kristina Alaina</h2>
                    <span>Bank Manager</span>
                </li>
                <li class="card">
                    <div class="img"><img
                            src="https://images.unsplash.com/photo-1758876020901-043330cd7986?q=80&w=1032&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                            alt="img" draggable="false"></div>
                    <h2>Harry Gudbrand</h2>
                    <span>App Designer</span>
                </li>
            </ul>
            <i id="right" class="fa-solid fa-angle-right"></i>
        </div>
    </div>
    <script src="scripts.js"></script>

</body>

</html>
